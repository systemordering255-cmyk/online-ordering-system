<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cart &amp; Checkout</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f8f9fa;color:#333}
.header{background:#4a90d9;color:#fff;padding:0 20px;display:flex;align-items:center;gap:16px;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.back-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:14px}
.back-btn:hover{background:rgba(255,255,255,.35)}
.header h1{font-size:20px;font-weight:700}
.container{max-width:760px;margin:0 auto;padding:20px}
.section{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.section h2{font-size:17px;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #eee}
.cart-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f0f0f0}
.cart-item:last-child{border-bottom:none}
.item-img{width:60px;height:60px;border-radius:8px;object-fit:cover;background:#f0f4ff;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;overflow:hidden}
.item-img img{width:100%;height:100%;object-fit:cover}
.item-info{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-price{font-size:13px;color:#777;margin-top:2px}
.qty-controls{display:flex;align-items:center;gap:8px}
.qty-btn{width:28px;height:28px;border:1px solid #ddd;background:#fff;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.qty-btn:hover{background:#4a90d9;color:#fff;border-color:#4a90d9}
.qty-num{font-size:15px;font-weight:600;min-width:24px;text-align:center}
.item-total{font-size:15px;font-weight:700;color:#4a90d9;min-width:60px;text-align:right}
.remove-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:18px;transition:color .2s;padding:4px}
.remove-btn:hover{color:#f44336}
.summary-row{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;border-bottom:1px solid #f5f5f5}
.summary-row:last-child{border-bottom:none;font-size:17px;font-weight:700;color:#4a90d9;padding-top:12px}
.min-order-note{font-size:12px;color:#ff9800;margin-top:8px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:6px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:11px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border .2s;background:#fff}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:#4a90d9}
.form-group textarea{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.payment-options{display:flex;flex-direction:column;gap:10px}
.pay-opt{border:2px solid #eee;border-radius:10px;padding:14px;cursor:pointer;display:flex;align-items:flex-start;gap:12px;transition:border .2s}
.pay-opt:hover{border-color:#4a90d9}
.pay-opt.selected{border-color:#4a90d9;background:#f0f7ff}
.pay-opt input{margin-top:2px;accent-color:#4a90d9}
.pay-opt-info{flex:1}
.pay-opt-title{font-weight:600;font-size:14px}
.pay-opt-desc{font-size:12px;color:#777;margin-top:3px}
.upi-section{background:#f0f7ff;border-radius:10px;padding:16px;margin-top:12px;display:none;text-align:center}
.upi-section.show{display:block}
.upi-qr{max-width:180px;border-radius:8px;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.upi-id-row{display:flex;align-items:center;justify-content:center;gap:8px;margin:12px 0;font-weight:600;font-size:16px}
.copy-btn{background:#4a90d9;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.utr-input{margin-top:12px}
.collect-options{display:flex;gap:10px}
.collect-opt{flex:1;border:2px solid #eee;border-radius:10px;padding:14px;cursor:pointer;text-align:center;transition:border .2s}
.collect-opt:hover{border-color:#4a90d9}
.collect-opt.selected{border-color:#4a90d9;background:#f0f7ff}
.collect-opt input{display:none}
.co-icon{font-size:28px;margin-bottom:6px}
.co-title{font-size:14px;font-weight:700}
.co-desc{font-size:11px;color:#777;margin-top:3px}
.submit-btn{width:100%;padding:16px;background:#4a90d9;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:background .2s;margin-top:4px}
.submit-btn:hover{background:#357abd}
.submit-btn:disabled{background:#ccc;cursor:not-allowed}
.error-msg{color:#f44336;font-size:13px;margin-top:8px;display:none}
.empty-cart{text-align:center;padding:60px 20px;color:#aaa}
.empty-cart a{color:#4a90d9;text-decoration:none;font-weight:600;margin-top:16px;display:block}
.offer-banner{background:linear-gradient(135deg,#ff6b35,#f7931e);border-radius:12px;padding:16px 20px;margin-bottom:16px;color:#fff;display:none}
.offer-banner.show{display:block}
.offer-banner-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.offer-tag{font-size:11px;background:rgba(0,0,0,.2);padding:3px 10px;border-radius:20px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.offer-name-text{font-size:16px;font-weight:800}
.offer-desc-text{font-size:13px;opacity:.9;margin-bottom:10px}
.offer-bottom{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.offer-saving{font-size:20px;font-weight:800}
.offer-timer-wrap{text-align:right}
.offer-timer{font-size:15px;font-weight:700;font-family:monospace;background:rgba(0,0,0,.2);padding:5px 12px;border-radius:8px;letter-spacing:1px}
.offer-timer-label{font-size:10px;opacity:.75;margin-top:3px;text-align:center}
.no-offer-note{background:#f0f7ff;border:1px dashed #b3d1f5;border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#5a80a0;display:none}
.no-offer-note.show{display:block}
@media(max-width:480px){
  .form-row{grid-template-columns:1fr}
  .container{padding:12px}
  .section{padding:16px}
  .header h1{font-size:17px}
  .submit-btn{font-size:15px;padding:14px}
}
.pick-map-btn{margin-top:8px;background:#f0f7ff;border:1.5px solid #4a90d9;color:#4a90d9;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;width:100%}
.pick-map-btn:hover{background:#e0efff}
.map-overlay{position:fixed;inset:0;background:#fff;z-index:9999;display:flex;flex-direction:column;transition:opacity .2s}
.map-overlay.hidden{display:none}
.map-topbar{background:#fff;padding:10px 12px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.12);z-index:1000;flex-shrink:0;position:relative}
.map-back-btn{background:none;border:none;font-size:22px;cursor:pointer;color:#333;line-height:1;padding:4px 8px;border-radius:6px}
.map-back-btn:hover{background:#f0f0f0}
.map-search-wrap{flex:1;position:relative}
.map-search-input{width:100%;padding:10px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;outline:none;font-family:inherit}
.map-search-input:focus{border-color:#4a90d9}
.map-suggestions{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.18);z-index:2000;max-height:240px;overflow-y:auto}
.map-suggestion{padding:11px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid #f5f5f5;line-height:1.4;color:#333}
.map-suggestion:last-child{border-bottom:none}
.map-suggestion:hover{background:#f0f7ff}
.map-wrap{flex:1;position:relative;overflow:hidden}
#cartMap{width:100%;height:100%}
.map-pin{position:absolute;top:50%;left:50%;transform:translate(-50%,-100%) translateY(-2px);font-size:38px;z-index:10;pointer-events:none;filter:drop-shadow(0 3px 5px rgba(0,0,0,.35));line-height:1}
.map-gps-btn{position:absolute;right:14px;top:14px;background:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.2);z-index:10;display:flex;align-items:center;justify-content:center}
.map-gps-btn:hover{background:#f0f7ff}
.map-bottombar{background:#fff;padding:14px 16px;box-shadow:0 -2px 8px rgba(0,0,0,.1);flex-shrink:0}
.map-addr-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:11px;min-height:20px}
.map-addr-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.map-addr-text{font-size:13px;color:#444;line-height:1.5;flex:1}
.map-confirm-btn{width:100%;padding:14px;background:#4a90d9;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.map-confirm-btn:hover{background:#357abd}
</style>
</head>
<body>

<header class="header">
  <button class="back-btn" onclick="window.location.href='/index.html'">&#8592; Back</button>
  <h1>Cart &amp; Checkout</h1>
</header>

<div class="container" id="mainContainer">

  <div class="section" id="cartSection">
    <h2>Your Items</h2>
    <div id="cartItems"></div>
  </div>

  <div class="section" id="summarySection" style="display:none">
    <h2>Order Summary</h2>
    <div id="summaryRows"></div>
    <div id="minOrderNote" class="min-order-note"></div>
  </div>

  <div class="offer-banner" id="offerBanner">
    <div class="offer-banner-top">
      <span class="offer-tag">&#127881; Offer Applied</span>
      <span class="offer-name-text" id="offerBannerName"></span>
    </div>
    <div class="offer-desc-text" id="offerBannerDesc"></div>
    <div class="offer-bottom">
      <div class="offer-saving">You save <span id="offerBannerSaving"></span>!</div>
      <div class="offer-timer-wrap">
        <div class="offer-timer" id="offerCountdownEl">--:--:--</div>
        <div class="offer-timer-label">Offer expires in</div>
      </div>
    </div>
  </div>
  <div class="no-offer-note" id="noOfferNote">No active offers right now. Check back later!</div>

  <div class="section" id="checkoutSection" style="display:none">
    <h2 id="checkoutTitle">Delivery Details</h2>
    <form id="checkoutForm" onsubmit="submitOrder(event)">

      <div class="form-group">
        <label>Collection Method</label>
        <div class="collect-options">
          <label class="collect-opt selected" id="deliveryOpt" onclick="selectCollection('Delivery')">
            <input type="radio" name="collection" value="Delivery" checked>
            <div class="co-icon">&#128666;</div>
            <div class="co-title">Delivery</div>
            <div class="co-desc">Delivered to your address</div>
          </label>
          <label class="collect-opt" id="pickupOpt" onclick="selectCollection('Pickup')">
            <input type="radio" name="collection" value="Pickup">
            <div class="co-icon">&#127978;</div>
            <div class="co-title">Pickup</div>
            <div class="co-desc">Collect from store</div>
          </label>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input id="custName" type="text" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label>Phone *</label>
          <input id="custPhone" type="tel" placeholder="10-digit number" pattern="[0-9]{10}" required>
        </div>
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input id="custEmail" type="email" placeholder="For order updates" required>
      </div>
      <div class="form-group" id="addressGroup">
        <label>Delivery Address *</label>
        <textarea id="custAddress" placeholder="Full address incl. flat, street, landmark..." required></textarea>
        <button type="button" class="pick-map-btn" onclick="openMapPicker()">&#128205; Pick on Map</button>
      </div>
      <div class="form-group">
        <label>Special Instructions (optional)</label>
        <textarea id="custNotes" placeholder="Allergies, special requests..."></textarea>
      </div>

      <div class="form-group">
        <label>Payment Method</label>
        <div class="payment-options">
          <label class="pay-opt selected" id="upiOpt" onclick="selectPayment('UPI')">
            <input type="radio" name="payment" value="UPI" checked>
            <div class="pay-opt-info">
              <div class="pay-opt-title">&#128241; UPI / QR Code</div>
              <div class="pay-opt-desc">Pay via any UPI app (GPay, PhonePe, Paytm...)</div>
            </div>
          </label>
          <label class="pay-opt" id="codOpt" onclick="selectPayment('COD')">
            <input type="radio" name="payment" value="COD">
            <div class="pay-opt-info">
              <div class="pay-opt-title">&#128181; Cash / Pay on Delivery</div>
              <div class="pay-opt-desc">Pay with cash when your order arrives</div>
            </div>
          </label>
        </div>
      </div>

      <div class="upi-section show" id="upiSection">
        <p style="font-size:13px;color:#555;margin-bottom:12px">Scan the QR code or use the UPI ID below to pay</p>
        <img id="upiQR" class="upi-qr" src="" alt="QR Code" style="display:none">
        <div class="upi-id-row">
          <span id="upiIdText">--</span>
          <button type="button" class="copy-btn" onclick="copyUPI()">Copy</button>
        </div>
        <p style="font-size:13px;font-weight:600;color:#4a90d9;margin-bottom:6px">
          Amount to pay: <span id="upiAmount">Rs.0</span>
        </p>
        <div class="utr-input">
          <label style="font-size:13px;font-weight:600;color:#555;display:block;margin-bottom:6px">UTR / Transaction Reference Number *</label>
          <input id="utrInput" type="text" placeholder="Enter 12-digit UTR or ref number">
        </div>
      </div>

      <div id="formError" class="error-msg"></div>
      <button type="submit" class="submit-btn" id="submitBtn">Place Order</button>
    </form>
  </div>

</div>

<!-- Map picker overlay -->
<div class="map-overlay hidden" id="mapOverlay">
  <div class="map-topbar">
    <button class="map-back-btn" onclick="closeMapPicker()" title="Back">&#8592;</button>
    <div class="map-search-wrap">
      <input class="map-search-input" id="mapSearchInput" type="text" placeholder="Search area, street, landmark..." autocomplete="off" oninput="onMapSearch(this.value)">
      <div class="map-suggestions" id="mapSuggestions" style="display:none"></div>
    </div>
  </div>
  <div class="map-wrap">
    <div id="cartMap"></div>
    <div class="map-pin">&#128205;</div>
    <button class="map-gps-btn" onclick="centerOnGps()" title="Use my location">&#127919;</button>
  </div>
  <div class="map-bottombar">
    <div class="map-addr-row">
      <span class="map-addr-icon">&#128205;</span>
      <span class="map-addr-text" id="mapAddrText">Move the map to pin your address</span>
    </div>
    <button class="map-confirm-btn" onclick="confirmMapLocation()">&#10003; Confirm This Location</button>
  </div>
</div>

<script>
var cart = {}, settings = {};
var selectedCollection = 'Delivery';
var selectedPayment = 'UPI';
var activeOffers = [], appliedOffer = null, offerCountdownTimer = null;

window.onload = async function() {
  var name  = localStorage.getItem('oos_cust_name');
  var phone = localStorage.getItem('oos_cust_phone');
  var email = localStorage.getItem('oos_cust_email');
  if (name)  document.getElementById('custName').value  = name;
  if (phone) document.getElementById('custPhone').value = phone;
  if (email) document.getElementById('custEmail').value = email;

  try {
    var r = await fetch('/api/settings');
    settings = await r.json();
    populateUPI();
  } catch(e) {}

  try {
    var or = await fetch('/api/offers');
    activeOffers = await or.json();
  } catch(e) { activeOffers = []; }

  loadCart();
};

function loadCart() {
  try { cart = JSON.parse(localStorage.getItem('oos_cart') || '{}'); } catch(e){ cart = {}; }
  renderCart();
}
function saveCart() { localStorage.setItem('oos_cart', JSON.stringify(cart)); }

function renderCart() {
  var items = Object.values(cart).filter(function(i){ return i.qty > 0; });
  if (!items.length) {
    document.getElementById('cartSection').innerHTML =
      '<div class="empty-cart">' +
      '<p style="font-size:48px">&#128722;</p>' +
      '<p style="font-size:18px;font-weight:600;margin-top:12px">Your cart is empty</p>' +
      '<a href="/index.html">Browse Products &#8594;</a></div>';
    document.getElementById('summarySection').style.display = 'none';
    document.getElementById('checkoutSection').style.display = 'none';
    return;
  }
  var sym = settings.currency_symbol || 'Rs.';
  var html = items.map(function(item) {
    var imgHtml = (item.image_url || item.imageUrl)
      ? '<img src="' + escAttr(item.image_url || item.imageUrl) + '" alt="">'
      : '&#128722;';
    return '<div class="cart-item">' +
      '<div class="item-img">' + imgHtml + '</div>' +
      '<div class="item-info">' +
        '<div class="item-name">' + esc(item.name) + '</div>' +
        '<div class="item-price">' + sym + parseFloat(item.price).toFixed(2) + ' each</div>' +
      '</div>' +
      '<div class="qty-controls">' +
        '<button type="button" class="qty-btn" onclick="changeQty(\'' + item.id + '\',-1)">-</button>' +
        '<span class="qty-num">' + item.qty + '</span>' +
        '<button type="button" class="qty-btn" onclick="changeQty(\'' + item.id + '\',1)">+</button>' +
      '</div>' +
      '<div class="item-total">' + sym + (parseFloat(item.price) * item.qty).toFixed(2) + '</div>' +
      '<button type="button" class="remove-btn" onclick="removeItem(\'' + item.id + '\')">&#215;</button>' +
    '</div>';
  }).join('');
  document.getElementById('cartItems').innerHTML = html;
  checkOffers();
  document.getElementById('summarySection').style.display = 'block';
  document.getElementById('checkoutSection').style.display = 'block';
}

function getCartSubtotal() {
  return Object.values(cart).reduce(function(s,i){ return s + parseFloat(i.price) * i.qty; }, 0);
}

function renderSummary() {
  var sym         = settings.currency_symbol || 'Rs.';
  var deliveryFee = selectedCollection === 'Pickup' ? 0 : (parseFloat(settings.delivery_fee) || 0);
  var minOrder    = parseFloat(settings.minimum_order) || 0;
  var subtotal    = getCartSubtotal();
  var discount    = appliedOffer ? appliedOffer.discountAmount : 0;
  var total       = Math.max(0, subtotal + deliveryFee - discount);

  var discountRow = discount > 0
    ? '<div class="summary-row" style="color:#e65100"><span>Discount (' + esc(appliedOffer.name) + ')</span><span>- ' + sym + discount.toFixed(2) + '</span></div>'
    : '';

  document.getElementById('summaryRows').innerHTML =
    '<div class="summary-row"><span>Subtotal</span><span>' + sym + subtotal.toFixed(2) + '</span></div>' +
    '<div class="summary-row"><span>Delivery Fee</span><span>' + sym + deliveryFee.toFixed(2) + '</span></div>' +
    discountRow +
    '<div class="summary-row"><span>Total</span><span>' + sym + total.toFixed(2) + '</span></div>';

  document.getElementById('upiAmount').textContent = sym + total.toFixed(2);

  var note = subtotal < minOrder && minOrder > 0
    ? 'Minimum order is ' + sym + minOrder + '. Add ' + sym + (minOrder - subtotal).toFixed(2) + ' more.'
    : '';
  document.getElementById('minOrderNote').textContent = note;
}

function checkOffers() {
  if (offerCountdownTimer) { clearInterval(offerCountdownTimer); offerCountdownTimer = null; }
  appliedOffer = null;

  var items = Object.values(cart).filter(function(i){ return i.qty > 0; });
  if (!items.length) {
    document.getElementById('offerBanner').classList.remove('show');
    document.getElementById('noOfferNote').classList.remove('show');
    renderSummary();
    return;
  }

  var subtotal = getCartSubtotal();
  var sym = settings.currency_symbol || 'Rs.';
  var best = null, bestDiscount = 0;

  activeOffers.forEach(function(offer) {
    if (subtotal < parseFloat(offer.min_order || 0)) return;
    if (offer.apply_to === 'product') {
      if (!offer.product_id) return;
      if (!items.some(function(i){ return String(i.id) === String(offer.product_id); })) return;
    }
    var disc = offer.discount_type === 'percent'
      ? subtotal * (parseFloat(offer.discount_value) / 100)
      : parseFloat(offer.discount_value);
    disc = Math.min(Math.round(disc * 100) / 100, subtotal);
    if (disc > bestDiscount) { bestDiscount = disc; best = Object.assign({}, offer, { discountAmount: disc }); }
  });

  if (best) {
    appliedOffer = best;
    document.getElementById('offerBannerName').textContent = best.name;
    document.getElementById('offerBannerDesc').textContent = best.description || '';
    document.getElementById('offerBannerSaving').textContent = sym + best.discountAmount.toFixed(2);
    document.getElementById('offerBanner').classList.add('show');
    document.getElementById('noOfferNote').classList.remove('show');

    function updateCountdown() {
      var diff = new Date(best.valid_to) - new Date();
      if (diff <= 0) {
        document.getElementById('offerCountdownEl').textContent = 'Expired';
        clearInterval(offerCountdownTimer);
        activeOffers = activeOffers.filter(function(o){ return o.id !== best.id; });
        checkOffers();
        return;
      }
      var h = Math.floor(diff / 3600000);
      var m = Math.floor((diff % 3600000) / 60000);
      var s = Math.floor((diff % 60000) / 1000);
      function pad(n){ return n < 10 ? '0'+n : String(n); }
      document.getElementById('offerCountdownEl').textContent = pad(h) + ':' + pad(m) + ':' + pad(s);
    }
    updateCountdown();
    offerCountdownTimer = setInterval(updateCountdown, 1000);
  } else {
    document.getElementById('offerBanner').classList.remove('show');
    document.getElementById('noOfferNote').classList.add('show');
  }

  renderSummary();
}

function changeQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  saveCart(); renderCart();
}
function removeItem(id) { delete cart[id]; saveCart(); renderCart(); }


function selectCollection(method) {
  selectedCollection = method;
  document.getElementById('deliveryOpt').classList.toggle('selected', method === 'Delivery');
  document.getElementById('pickupOpt').classList.toggle('selected', method === 'Pickup');
  var addrInput = document.getElementById('custAddress');
  if (method === 'Pickup') {
    document.getElementById('addressGroup').style.display = 'none';
    addrInput.required = false; addrInput.value = '';
    document.getElementById('checkoutTitle').textContent = 'Your Details';
  } else {
    document.getElementById('addressGroup').style.display = 'block';
    addrInput.required = true;
    document.getElementById('checkoutTitle').textContent = 'Delivery Details';
  }
  checkOffers();
}

function selectPayment(method) {
  selectedPayment = method;
  document.getElementById('upiOpt').classList.toggle('selected', method === 'UPI');
  document.getElementById('codOpt').classList.toggle('selected', method === 'COD');
  document.getElementById('upiSection').classList.toggle('show', method === 'UPI');
}

function populateUPI() {
  if (settings.upi_qr_url) {
    var qr = document.getElementById('upiQR');
    qr.src = settings.upi_qr_url; qr.style.display = 'block';
  }
  document.getElementById('upiIdText').textContent = settings.upi_id || '--';
}

function copyUPI() {
  var id = settings.upi_id || '';
  if (navigator.clipboard) navigator.clipboard.writeText(id);
  else { var t=document.createElement('textarea');t.value=id;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t); }
  document.querySelector('.copy-btn').textContent = 'Copied!';
  setTimeout(function(){ document.querySelector('.copy-btn').textContent = 'Copy'; }, 1500);
}

async function submitOrder(e) {
  e.preventDefault();
  var err = document.getElementById('formError');
  err.style.display = 'none';

  var token = localStorage.getItem('oos_cust_token');
  if (!token) {
    sessionStorage.setItem('oos_after_login', 'cart');
    window.location.href = '/index.html';
    return;
  }

  var items = Object.values(cart).filter(function(i){ return i.qty > 0; });
  if (!items.length) { showError('Your cart is empty.'); return; }

  var minOrder = parseFloat(settings.minimum_order) || 0;
  var subtotal = items.reduce(function(s,i){ return s + parseFloat(i.price) * i.qty; }, 0);
  if (subtotal < minOrder && minOrder > 0) {
    showError('Minimum order amount is ' + (settings.currency_symbol||'Rs.') + minOrder + '.');
    return;
  }

  var utr = document.getElementById('utrInput').value.trim();
  if (selectedPayment === 'UPI' && !utr) {
    showError('Please enter your UTR / Transaction Reference Number.');
    return;
  }

  var btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Placing order...';

  var orderData = {
    action:           'place',
    customerName:     document.getElementById('custName').value.trim(),
    phone:            document.getElementById('custPhone').value.trim(),
    email:            document.getElementById('custEmail').value.trim(),
    address:          selectedCollection === 'Pickup' ? 'Store Pickup' : document.getElementById('custAddress').value.trim(),
    notes:            document.getElementById('custNotes').value.trim(),
    paymentMethod:    selectedPayment,
    collectionMethod: selectedCollection,
    utr:              utr,
    items:            items.map(function(i){ return { id: i.id, name: i.name, qty: i.qty, price: parseFloat(i.price) }; })
  };

  try {
    var r = await fetch('/api/orders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(orderData)
    });
    var result = await r.json();
    if (result.success) {
      localStorage.removeItem('oos_cart');
      localStorage.setItem('oos_last_order', JSON.stringify({
        orderId: result.orderId, total: result.total, paymentMethod: orderData.paymentMethod
      }));
      window.location.href = '/index.html';
    } else {
      showError(result.error || 'Failed to place order. Please try again.');
      btn.disabled = false; btn.textContent = 'Place Order';
    }
  } catch(ex) {
    showError('Network error. Please try again.');
    btn.disabled = false; btn.textContent = 'Place Order';
  }
}

function showError(msg) {
  var err = document.getElementById('formError');
  err.textContent = msg; err.style.display = 'block';
  err.scrollIntoView({ behavior: 'smooth', block: 'center' });
}
function esc(s){ var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function escAttr(s){ return (s||'').replace(/"/g,'&quot;'); }

// ── Map picker ──────────────────────────────────────────────
var _cartMap = null, _mapGeocodeTimer = null, _mapSearchTimer = null;
var _mapSuggestions = [];

function buildAddress(d) {
  var a = d.address || {};
  var parts = [];
  var street = [a.house_number, a.road || a.pedestrian || a.footway || a.path || a.highway].filter(Boolean).join(' ');
  if (street) parts.push(street);
  var locality = a.neighbourhood || a.suburb || a.quarter || a.residential;
  if (locality) parts.push(locality);
  var city = a.city || a.town || a.village || a.county || a.municipality;
  if (city) parts.push(city);
  if (a.state) parts.push(a.state);
  if (a.postcode) parts.push(a.postcode);
  return parts.length ? parts.join(', ') : (d.display_name || '');
}

function suggestionLabel(s) {
  var a = s.address || {};
  var name = s.name || a.road || a.neighbourhood || a.suburb || '';
  var city = a.city || a.town || a.village || a.county || '';
  var state = a.state || '';
  var secondary = [city, state].filter(Boolean).join(', ');
  return name ? (name + (secondary ? '<br><small style="color:#888">' + esc(secondary) + '</small>' : '')) : esc(s.display_name);
}

function openMapPicker() {
  document.getElementById('mapOverlay').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
  if (!_cartMap) {
    _cartMap = L.map('cartMap', { zoomControl: true }).setView([20.5937, 78.9629], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19
    }).addTo(_cartMap);
    _cartMap.on('movestart', function(){ document.getElementById('mapAddrText').textContent = 'Locating address...'; });
    _cartMap.on('moveend', onCartMapMove);
  }
  setTimeout(function(){ _cartMap.invalidateSize(); centerOnGps(); }, 120);
}

function closeMapPicker() {
  document.getElementById('mapOverlay').classList.add('hidden');
  document.body.style.overflow = '';
  document.getElementById('mapSuggestions').style.display = 'none';
}

function centerOnGps() {
  if (!navigator.geolocation) return;
  document.getElementById('mapAddrText').textContent = 'Getting your location...';
  navigator.geolocation.getCurrentPosition(
    function(pos) { _cartMap.setView([pos.coords.latitude, pos.coords.longitude], 18); },
    function() { document.getElementById('mapAddrText').textContent = 'Move the map to pin your address'; },
    { enableHighAccuracy: true, timeout: 8000 }
  );
}

function onCartMapMove() {
  clearTimeout(_mapGeocodeTimer);
  var c = _cartMap.getCenter();
  _mapGeocodeTimer = setTimeout(function(){ reverseGeocodeCart(c.lat, c.lng); }, 600);
}

async function reverseGeocodeCart(lat, lng) {
  try {
    var url = 'https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lng +
              '&format=json&zoom=18&addressdetails=1';
    var r = await fetch(url, { headers: { 'Accept-Language': 'en' } });
    var d = await r.json();
    var addr = buildAddress(d);
    document.getElementById('mapAddrText').textContent = addr || 'Address not found';
  } catch(e) {
    document.getElementById('mapAddrText').textContent = 'Could not load address';
  }
}

function onMapSearch(query) {
  clearTimeout(_mapSearchTimer);
  var box = document.getElementById('mapSuggestions');
  if (!query || query.length < 3) { box.style.display = 'none'; return; }
  box.innerHTML = '<div class="map-suggestion" style="color:#888;cursor:default">Searching...</div>';
  box.style.display = 'block';
  _mapSearchTimer = setTimeout(async function() {
    try {
      var r = await fetch('https://photon.komoot.io/api/?q=' + encodeURIComponent(query) + '&limit=6&lang=en');
      var d = await r.json();
      _mapSuggestions = d.features || [];
      if (!_mapSuggestions.length) {
        box.innerHTML = '<div class="map-suggestion" style="color:#888;cursor:default">No results found</div>';
        return;
      }
      box.innerHTML = _mapSuggestions.map(function(s, i){
        var p = s.properties;
        var name = p.name || p.street || p.city || p.county || '';
        var city  = p.city || p.town || p.village || p.county || '';
        var state = p.state || '';
        var sub   = [city, state].filter(Boolean).join(', ');
        return '<div class="map-suggestion" onclick="pickSuggestion(' + i + ')">' +
          esc(name || '') +
          (sub && sub !== name ? '<br><small style="color:#888">' + esc(sub) + '</small>' : '') +
        '</div>';
      }).join('');
    } catch(e) {
      box.innerHTML = '<div class="map-suggestion" style="color:#f00;cursor:default">Error: ' + e.message + '</div>';
    }
  }, 600);
}

function pickSuggestion(idx) {
  var s = _mapSuggestions[idx];
  if (!s) return;
  var coords = s.geometry.coordinates;
  _cartMap.setView([coords[1], coords[0]], 18);
  document.getElementById('mapSearchInput').value = '';
  document.getElementById('mapSuggestions').style.display = 'none';
}

function confirmMapLocation() {
  var addr = document.getElementById('mapAddrText').textContent;
  var invalid = ['Move the map to pin your address', 'Locating address...', 'Getting your location...', 'Could not load address', 'Address not found', 'Move the map to select an address first.'];
  if (invalid.indexOf(addr) !== -1) {
    document.getElementById('mapAddrText').textContent = 'Move the map to select an address first.';
    return;
  }
  document.getElementById('custAddress').value = addr;
  closeMapPicker();
}
</script>
